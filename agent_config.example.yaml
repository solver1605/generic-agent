default_model_card: gemini_flash_fast
default_policy_profile: balanced
default_agent_profile: default

runtime:
  default_engine: langgraph
  allowed_engines: [langgraph, google_adk]

adk:
  enabled: false
  timeout_s: 30.0
  max_steps: 64
  model: null

streamlit:
  app_name: Emergent Planner
  page_title: Emergent Planner UI

model_cards:
  - id: gemini_flash_fast
    provider: google_genai
    model_name: models/gemini-3-flash-preview
    temperature: 0.0
    thinking_budget: 0
    max_output_tokens: 2048
    model_kwargs: {}

  - id: gemini_flash_reasoning
    provider: google_genai
    model_name: models/gemini-3-flash-preview
    temperature: 0.0
    thinking_budget: 1024
    max_output_tokens: 4096
    model_kwargs:
      top_p: 0.95

policy_profiles:
  - id: compact
    description: Tighter prompt budget for faster lightweight runs.
    budget:
      max_prompt_tokens: 10000
      reserved_for_generation: 2200
      max_tool_snippet_chars: 700
      max_skills_chars: 1200
      max_skills_top_k: 6
      planning_trigger_chars: 220
      min_input_tokens: 1200
      min_system_message_chars: 180
    summary:
      summarize_when_history_len_exceeds: 30
      keep_last_n_messages: 12
    tool_log:
      artifacts_dir: artifacts/tool_logs
      max_inline_chars: 900

  - id: balanced
    description: Default profile for most interactions.
    budget:
      max_prompt_tokens: 16000
      reserved_for_generation: 2000
      max_tool_snippet_chars: 1200
      max_skills_chars: 2500
      max_skills_top_k: 12
      planning_trigger_chars: 280
      min_input_tokens: 1000
      min_system_message_chars: 200
    summary:
      summarize_when_history_len_exceeds: 50
      keep_last_n_messages: 18
    tool_log:
      artifacts_dir: artifacts/tool_logs
      max_inline_chars: 1200

  - id: deep_research
    description: Large prompt budget for synthesis-heavy deep research.
    budget:
      max_prompt_tokens: 24000
      reserved_for_generation: 3000
      max_tool_snippet_chars: 2200
      max_skills_chars: 4000
      max_skills_top_k: 20
      planning_trigger_chars: 180
      min_input_tokens: 1400
      min_system_message_chars: 220
    summary:
      summarize_when_history_len_exceeds: 70
      keep_last_n_messages: 24
    tool_log:
      artifacts_dir: artifacts/tool_logs
      max_inline_chars: 2000

search:
  providers:
    - name: tavily
      enabled: true
      api_key_env: TAVILY_API_KEY
      timeout_s: 8.0
      weight: 1.0
    - name: brave
      enabled: true
      api_key_env: BRAVE_API_KEY
      timeout_s: 8.0
      weight: 1.0
  budgets:
    max_providers_per_call: 2
    max_results_per_provider: 8
    max_total_results_before_rerank: 40
    max_enriched_results: 3
    global_timeout_s: 12.0
  defaults:
    default_top_k: 8
    default_recency_days: 30
    default_mode: balanced
    default_enrich: false
    provider_priority: [tavily, brave]

subagents:
  enabled: true
  max_workers_default: 4
  max_workers_limit: 16
  max_worker_turns_default: 8
  max_worker_turns_limit: 64
  max_wall_time_s_default: 45.0
  max_wall_time_s_limit: 600.0
  max_retries_default: 1
  max_retries_limit: 6
  artifact_dir: artifacts/subagents
  tool_policy:
    allow_by_task_type:
      default: [read_file, read_file_range, search_web, python_repl]
      research: [search_web, read_file, read_file_range]
      analysis: [python_repl, read_file, read_file_range, search_web]
      writing: [read_file, read_file_range, search_web]
    denylist: [write_file, verify_with_user, spawn_subagents]
    permitted_overrides: [search_web, python_repl, read_file, read_file_range]

tool_catalog:
  allow_module_prefixes: [emergent_planner, src.emergent_planner, custom_tools]
  custom_imports: []

agent_profiles:
  - id: default
    description: Legacy-compatible default profile.
    model_card_id: gemini_flash_fast
    policy_profile_id: balanced
    runtime_engine: null
    prompts:
      strategy: merge
      disable_cards: []
      cards: []
    tools:
      allow: []
      deny: []
    skills:
      roots: [.skills]
      allowlist: []
      denylist: []

  - id: research_assistant
    description: Research-oriented profile with focused tools and skills.
    model_card_id: gemini_flash_reasoning
    policy_profile_id: deep_research
    runtime_engine: null
    prompts:
      strategy: merge
      disable_cards: [guidelines]
      cards:
        - name: guidelines
          tags: [core]
          priority: 10
          file: prompts/research_guidelines.md
    tools:
      allow: [load_skill, search_web, spawn_subagents, verify_with_user, read_file, read_file_range]
      deny: [python_repl]
    skills:
      roots: [.skills, services/research/.skills]
      allowlist: [deep-research]
      denylist: []
